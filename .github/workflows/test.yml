name: test

on:
  workflow_dispatch:
  push:
  pull_request:
    branches:
      - main

# cancel existing runs of the same workflow on the same ref
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  CONSUL_LICENSE: ${{ secrets.CONSUL_LICENSE }}
  # Latest CE version, also present in the test matrix below — used by unit-tests-coverage.
  # ENT variants need CONSUL_LICENSE and cannot be used in the coverage job.
  CONSUL_CE_VERSION: "2.0.1"

jobs:
  get-go-version:
    uses: ./.github/workflows/reusable-get-go-version.yml

  lint:
    needs:
      - get-go-version
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout
      uses: actions/checkout@0ad4b8fadaa221de15dcec353f45205ec38ea70b # v4.1.4
    - uses: actions/setup-go@cdcb36043654635271a94b9a6d1392de5bb323a7 # v5.0.1
      with:
        go-version: ${{ needs.get-go-version.outputs.go-version }}
    - name: golangci-lint
      uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
      with:
        version: v2.12.2
        args: |
          --verbose
        only-new-issues: false
        skip-cache: true
    - name: lint-consul-retry
      shell: bash
      run: |
        go install github.com/hashicorp/lint-consul-retry@master && lint-consul-retry

  test:
    needs:
      - get-go-version
    name: unit test (consul-version=${{ matrix.consul-version }})
    strategy:
      matrix:
        consul-version:
          - 1.22.7
          - 1.22.8+ent
          - 2.0.1
          - 2.0.1+ent
    env:
      TEST_RESULTS_DIR: /tmp/test-results
      GOTESTSUM_VERSION: 1.8.2
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout
      uses: actions/checkout@0ad4b8fadaa221de15dcec353f45205ec38ea70b # v4.1.4
    - uses: actions/setup-go@cdcb36043654635271a94b9a6d1392de5bb323a7 # v5.0.1
      with:
        go-version: ${{ needs.get-go-version.outputs.go-version }}
    - name: Install Consul
      shell: bash
      run: |
        CONSUL_VERSION="${{ matrix.consul-version }}"
        FILENAME="consul_${CONSUL_VERSION}_linux_amd64.zip"
        curl -sSLO "https://releases.hashicorp.com/consul/${CONSUL_VERSION}/${FILENAME}" && \
          unzip "${FILENAME}" -d /usr/local/bin && \
          rm "${FILENAME}"
        consul version
    - name: Build
      run: go build -v ./...
    - name: Setup gotestsum
      shell: bash
      run: |
        url=https://github.com/gotestyourself/gotestsum/releases/download
        curl -sSL "${url}/v${{ env.GOTESTSUM_VERSION }}/gotestsum_${{ env.GOTESTSUM_VERSION }}_linux_amd64.tar.gz" | \
        tar -xz --overwrite -C /usr/local/bin gotestsum
    - name: Test
      run: |
        mkdir -p $TEST_RESULTS_DIR/${{ matrix.consul-version }}/json
        PACKAGE_NAMES=$(go list ./... | grep -v 'mocks\|hack\|testing' | tr '\n' ' ')
        echo "Testing $(echo $PACKAGE_NAMES | wc -w) packages"
        if [[ "${{ matrix.consul-version }}" == *ent ]]; then
          FLAGS=-enterprise
          TAGS=-tags=enterprise
        fi
        gotestsum \
          --format=short-verbose \
          --jsonfile $TEST_RESULTS_DIR/${{ matrix.consul-version }}/json/go-test-race.log \
          --junitfile $TEST_RESULTS_DIR/${{ matrix.consul-version }}/gotestsum-report.xml \
          -- $PACKAGE_NAMES $TAGS -- $FLAGS
    - uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
      with:
        name: ${{ matrix.consul-version }}-test-results
        path: ${{ env.TEST_RESULTS_DIR }}/${{ matrix.consul-version }}

  unit-tests-coverage:
    needs:
      - get-go-version
    name: unit-tests-coverage
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout
      uses: actions/checkout@0ad4b8fadaa221de15dcec353f45205ec38ea70b # v4.1.4
    - uses: actions/setup-go@cdcb36043654635271a94b9a6d1392de5bb323a7 # v5.0.1
      with:
        # Use go-version-file to install the version declared in go.mod (go 1.26),
        # avoiding a toolchain mismatch when .go-version and go.mod differ.
        go-version-file: go.mod
    - name: Install Consul
      shell: bash
      run: |
        CONSUL_VERSION="${{ env.CONSUL_CE_VERSION }}"
        curl -sSLO "https://releases.hashicorp.com/consul/${CONSUL_VERSION}/consul_${CONSUL_VERSION}_linux_amd64.zip"
        unzip -o "consul_${CONSUL_VERSION}_linux_amd64.zip" consul -d /usr/local/bin
        rm "consul_${CONSUL_VERSION}_linux_amd64.zip"
        consul version
    - name: Run unit tests with coverage
      run: |
        PACKAGE_NAMES=$(go list ./... | grep -v 'mocks\|hack\|testing' | tr '\n' ' ')
        go test -p 1 -coverprofile=coverage.txt -covermode=set $PACKAGE_NAMES
    - name: Upload coverage profile
      if: always()
      uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4.3.3
      with:
        name: ecs-coverage
        path: coverage.txt
        if-no-files-found: ignore

  coverage-report:
    needs:
      - get-go-version
      - unit-tests-coverage
    uses: ./.github/workflows/reusable-coverage-report.yml
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    with:
      pr-number: ${{ github.event_name == 'pull_request' && toJson(github.event.pull_request.number) || '' }}

  coverage-gate:
    name: coverage-gate
    needs: [coverage-report]
    # Patch coverage measures the lines a PR adds/modifies, so it only applies
    # to pull requests. Pushes to main run coverage-report for the badge but
    # have no "patch" to evaluate. Only gate when the report succeeded.
    if: ${{ !cancelled() && github.event_name == 'pull_request' && needs.coverage-report.result == 'success' }}
    runs-on: ubuntu-22.04
    env:
      # Minimum required coverage of the lines a PR adds/modifies (patch
      # coverage). New/changed code must be at least this well tested.
      PATCH_THRESHOLD: "90"
    steps:
      - name: Enforce patch coverage threshold
        env:
          PATCH: ${{ needs.coverage-report.outputs.patch }}
          COVERED: ${{ needs.coverage-report.outputs.patch_covered }}
          COVERABLE: ${{ needs.coverage-report.outputs.patch_coverable }}
        run: |
          set -euo pipefail

          echo "Patch coverage:     ${PATCH:-<empty>}"
          echo "Required threshold: ${PATCH_THRESHOLD}%"
          echo "Changed lines:      ${COVERED:-0}/${COVERABLE:-0} covered"

          # No coverable Go lines changed (docs/test-only) -> nothing to gate.
          # Fail closed: an empty PATCH means the reusable workflow could not
          # compute patch coverage (no coverage profile produced, so the patch
          # step was skipped). Don't let the gate pass unevaluated.
          if [ -z "${PATCH}" ]; then
            echo "::error::Patch coverage was not computed (no coverage profile produced). Failing closed."
            {
              echo "### ❌ Coverage gate failed"
              echo ""
              echo "Patch coverage could not be computed because no coverage profile was produced (unit tests may not have run or emitted coverage)."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          if [ "${PATCH}" = "N/A" ]; then
            echo "::notice::No coverable Go lines changed in this PR; patch-coverage gate skipped."
            {
              echo "### ✅ Coverage gate passed"
              echo ""
              echo "No coverable Go lines changed in this PR, so there is nothing to gate."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          PCT="${PATCH%\%}"

          if awk "BEGIN { exit !(${PCT} >= ${PATCH_THRESHOLD}) }"; then
            echo "::notice::Patch coverage ${PATCH} meets the ${PATCH_THRESHOLD}% threshold."
            {
              echo "### ✅ Coverage gate passed"
              echo ""
              echo "Patch coverage **${PATCH}** (${COVERED}/${COVERABLE} changed lines) ≥ required **${PATCH_THRESHOLD}%**."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::error::Patch coverage ${PATCH} is below the required ${PATCH_THRESHOLD}% threshold."
            {
              echo "### ❌ Coverage gate failed"
              echo ""
              echo "Patch coverage **${PATCH}** (${COVERED}/${COVERABLE} changed lines) is below the required **${PATCH_THRESHOLD}%** threshold."
              echo ""
              echo "The lines this PR adds or modifies are not sufficiently covered by tests."
              echo "Add tests for the new/changed code, or adjust \`PATCH_THRESHOLD\` in \`.github/workflows/test.yml\` (with reviewer sign-off)."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

  # This is job is required for branch protection as a required GitHub check
  # because GitHub actions show up as checks at the job level and not the
  # workflow level.  This is currently a feature request:
  # https://github.com/orgs/community/discussions/12395
  #
  # This job must:
  # - be placed after the fanout of a workflow so that everything fans back in
  #   to this job.
  # - "need" any job that is part of the fan out / fan in
  # - include if: always() logic because we may have conditional jobs that this job
  #   needs, and this would potentially get skipped if a previous job got skipped.
  #   The if clause ensures it does not get skipped.
  test-success:
    needs:
      - lint
      - test
      - unit-tests-coverage
      - coverage-report
      - coverage-gate
    runs-on: ubuntu-22.04
    if: always()
    steps:
      - name: evaluate upstream job results
        run: |
          # exit 1 if failure or cancelled result for any upstream job
          # this ensures that we fail the PR check regardless of cancellation, rather than skip-passing it
          # see https://docs.github.com/en/actions/using-jobs/using-conditions-to-control-job-execution#overview
          if printf '${{ toJSON(needs) }}' | grep -E -i '\"result\": \"(failure|cancelled)\"'; then
            printf "Tests failed or workflow cancelled:\n\n${{ toJSON(needs) }}"
            exit 1
          fi
